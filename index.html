<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AnimeStream</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>AnimeStream</h1>

    <input
      type="text"
      id="searchInput"
      placeholder="Search anime..."
    >
  </header>

  <section class="categories">

    <button class="category-btn" data-category="all">
      All
    </button>

    <button class="category-btn" data-category="action">
      Action
    </button>

    <button class="category-btn" data-category="romance">
      Romance
    </button>

  </section>

  <section>

    <h2>Trending Anime</h2>

    <div class="anime-container" id="trendingGrid">

    </div>

  </section>

  <section>

    <h2>Popular Anime</h2>

    <div class="anime-container" id="popularGrid">

    </div>

  </section>

  <script src="js/anime-data.js"></script>
  <script src="script.js"></script>

</body>

</html>
