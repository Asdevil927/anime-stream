<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Shadow Anime</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>

    <h1>Shadow Anime</h1>

    <input
      type="text"
      id="search"
      placeholder="Search anime..."
    >

    <div class="categories">

      <button class="category-btn" data-category="all">
        All
      </button>

      <button class="category-btn" data-category="action">
        Action
      </button>

      <button class="category-btn" data-category="romance">
        Romance
      </button>

    </div>

  </header>

  <section>

    <h2>Trending Anime</h2>

    <div class="anime-container">

      <!-- Naruto -->
      <a
        href="https://www.crunchyroll.com/series/GY9PJ5KWR/naruto"
        target="_blank"
        class="card"
        data-category="action"
      >

        <img
          src="https://cdn.myanimelist.net/images/anime/13/17405.jpg"
          alt="Naruto"
        >

        <h3>Naruto</h3>

      </a>

      <!-- Attack on Titan -->
      <a
        href="https://www.crunchyroll.com/series/GR751KNZY/attack-on-titan"
        target="_blank"
        class="card"
        data-category="action"
      >

        <img
          src="https://cdn.myanimelist.net/images/anime/10/47347.jpg"
          alt="Attack on Titan"
        >

        <h3>Attack on Titan</h3>

      </a>

      <!-- Your Name -->
      <a
        href="https://www.netflix.com/title/80161371"
        target="_blank"
        class="card"
        data-category="romance"
      >

        <img
          src="https://cdn.myanimelist.net/images/anime/5/87048.jpg"
          alt="Your Name"
        >

        <h3>Your Name</h3>

      </a>

      <!-- Demon Slayer -->
      <a
        href="https://www.crunchyroll.com/series/GY5P48XEY/demon-slayer-kimetsu-no-yaiba"
        target="_blank"
        class="card"
        data-category="action"
      >

        <img
          src="https://cdn.myanimelist.net/images/anime/1286/99889.jpg"
          alt="Demon Slayer"
        >

        <h3>Demon Slayer</h3>

      </a>

      <!-- One Piece -->
      <a
        href="https://www.crunchyroll.com/series/GRMG8ZQZR/one-piece"
        target="_blank"
        class="card"
        data-category="action"
      >

        <img
          src="https://cdn.myanimelist.net/images/anime/6/73245.jpg"
          alt="One Piece"
        >

        <h3>One Piece</h3>

      </a>

      <!-- Death Note -->
      <a
        href="https://www.netflix.com/title/70204970"
        target="_blank"
        class="card"
        data-category="action"
      >

        <img
          src="https://cdn.myanimelist.net/images/anime/9/9453.jpg"
          alt="Death Note"
        >

        <h3>Death Note</h3>

      </a>

      <!-- Solo Leveling -->
<a
  href="https://www.crunchyroll.com/series/GDKHZEJ0K/solo-leveling"
  target="_blank"
  class="card"
  data-category="action"
>

  <img
    src="https://static1.cbrimages.com/wordpress/wp-content/uploads/2024/01/solo-leveling-season-1.jpg"
    alt="Solo Leveling"
  >

  <h3>Solo Leveling</h3>

</a>

      <!-- Jujutsu Kaisen -->
      <a
        href="https://www.crunchyroll.com/series/GRDV0019R/jujutsu-kaisen"

        class="card"
        data-category="action"

        <img
          src="https://cdn.myanimelist.net/images/anime/1171/109222.jpg"
          alt="Jujutsu Kaisen"

  <script src="script.js"></script>
