<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shadow Anime</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>

    <!-- LOGO AREA -->
    <div class="logo-area">

      <img
        src="logo.jpg"
        alt="Logo"
        class="logo"
      >

      <h1>Shadow Anime</h1>

    </div>

    <!-- SEARCH -->
    <input type="text" id="search" placeholder="Search anime...">

    <!-- CATEGORY BUTTONS -->
    <div class="buttons">
      <button class="category-btn" data-category="all">All</button>
      <button class="category-btn" data-category="action">Action</button>
      <button class="category-btn" data-category="romance">Romance</button>
    </div>

  </header>

  <section>

    <h2>Trending Anime</h2>

    <!-- DYNAMIC ANIME CONTAINER -->
    <div class="anime-container" id="animeContainer"></div>

  </section>

  <script src="script.js"></script>

</body>
</html>
