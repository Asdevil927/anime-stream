<!DOCTYPE html>      <html lang="en">      
<head>      
  <meta charset="UTF-8" />      
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>      
  <title>Shadow Anime</title>        <link rel="stylesheet" href="style.css">      
</head>      
<body>        <header>      <!-- LOGO AREA -->      
<div class="logo-area">      
  
  <img      
    src="logo.jpg"      
    alt="Logo"      
    class="logo"      
  >      
  
  <h1>Shadow Anime</h1>      
  
</div>      
  
<!-- SEARCH -->      
<input      
  type="text"      
  id="search"      
  placeholder="Search anime..."      
>      
  
<!-- CATEGORY BUTTONS -->      
<div class="buttons">      
  
  <button      
    class="category-btn active"      
    data-category="all"      
  >      
    All      
  </button>      
  
  <button      
    class="category-btn"      
    data-category="action"      
  >      
    Action      
  </button>      
  
  <button      
    class="category-btn"      
    data-category="romance"      
  >      
    Romance      
  </button>      
  
</div>

  </header>      
  <!-- TRENDING SECTION -->   
  <section class="hero">    
    <div class="hero-content"> 
      <h1>Welcome to Shadow Anime</h1>      
  
<p>      
  Watch trending anime series and movies in one place.      
</p>

<h2 id="featuredAnime">Naruto</h2>      <button id="exploreBtn">Explore Now</button>

  </div>  
  </section>    
  <section class="top-anime">   
    <h2>Top Rated Anime</h2>   
    <div class="slider">     
      <div class="slide">Naruto</div>      
<div class="slide">Attack on Titan</div>      
<div class="slide">One Piece</div>      
<div class="slide">Demon Slayer</div>      
<div class="slide">Jujutsu Kaisen</div>

  </div>  
  </section>    
  <section>     
    <h2>Trending Anime</h2>     
    
  <section class="favorites-section">

  <h2>Your Favorites</h2>

  <div id="favoritesContainer"></div>

  </section>
    
    <section class="continue-section">

  <h2>Continue Watching</h2>

  <div id="continueContainer"></div>

    </section>
<!-- DYNAMIC ANIME CONTAINER -->      
<div      
  class="anime-container"      
  id="animeContainer"      
></div>

  </section>   
  <!-- MODAL -->   
  <div id="animeModal" class="modal">      <div class="modal-content">      
  
  <span class="close-btn">&times;</span>      
  
  <img id="modalImg" alt="Anime Image">      
  
  <h2 id="modalTitle"></h2>      
  
  <p id="modalCategory"></p>      
  
  <p id="modalDescription"></p>      
  
  <a      
    id="watchBtn"      
    target="_blank"      
  >      
    Watch Now      
  </a>      
  
</div>

  </div>  
  <!-- JS --> 
  <script src="script.js"></script>      </body>      
</html>
